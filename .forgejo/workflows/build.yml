name: Build

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build all loaders

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/*.gradle.kts', '**/gradle-wrapper.properties', '**/gradle.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build common, fabric and neoforge modules
        run: ./gradlew build --no-daemon

      # ForgeGradle 6 needs Gradle 8.8, which can't run on Java 25
      - name: Build forge-1.20.1
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          cd forge-1.20.1
          ./gradlew build --no-daemon

      - name: Stash jars
        uses: actions/upload-artifact@v3
        with:
          name: jars
          path: |
            fabric-*/build/libs/*.jar
            neoforge-*/build/libs/*.jar
            forge-1.20.1/build/libs/*.jar
          retention-days: 7
